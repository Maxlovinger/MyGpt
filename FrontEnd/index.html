<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darwin-1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: "BTCGods";
      src: url("fonts/BTCGods.woff") format("woff"),
           url("fonts/BTCGods.otf")  format("opentype");
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream:  #EFE4D2;
      --blue:   #254D70;
      --navy:   #131D4F;
      --rust:   #954C2E;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--navy);
      overflow: hidden;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* ── LAYOUT ── */
    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      grid-template-columns: 1fr 1fr;
      padding: 48px 56px;
      gap: 0;
      position: relative;
    }

    /* ── TOP-LEFT: small label ── */
    .label-tl {
      grid-row: 1; grid-column: 1;
      align-self: start;
      font-family: "DM Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--blue);
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
      text-transform: uppercase;
    }

    /* ── TOP-RIGHT: year ── */
    .label-tr {
      grid-row: 1; grid-column: 2;
      align-self: start;
      justify-self: end;
      font-family: "DM Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--rust);
      opacity: 0;
      animation: fadeUp 1s ease 0.5s forwards;
    }

    /* ── CENTER BLOCK ── */
    .center {
      grid-row: 2; grid-column: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0;
    }

    /* the small cursive above */
    .pre-title {
      font-family: "Pinyon Script", cursive;
      font-size: clamp(22px, 3vw, 36px);
      color: var(--rust);
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 1.2s ease 0.6s forwards;
      line-height: 1;
      margin-bottom: 6px;
    }

    /* parenthesis wrapper */
    .paren-wrap {
      display: flex;
      align-items: center;
      gap: 18px;
      opacity: 0;
      animation: fadeUp 1.4s ease 0.9s forwards;
    }

    .paren {
      font-family: "Cormorant Garamond", serif;
      font-weight: 300;
      font-size: clamp(60px, 10vw, 120px);
      color: var(--blue);
      opacity: 0.35;
      line-height: 1;
      transform: scaleY(1.2);
      display: inline-block;
    }

    /* DARWIN-1 in BTC Gods */
    .darwin {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .darwin-name {
      font-family: "BTCGods", sans-serif;
      font-size: clamp(52px, 9vw, 110px);
      letter-spacing: 0.05em;
      color: var(--navy);
      line-height: 0.9;
    }

    /* the "1" in digital DM Mono */
    .darwin-num {
      font-family: "DM Mono", monospace;
      font-size: clamp(13px, 1.6vw, 20px);
      letter-spacing: 0.4em;
      color: var(--rust);
      border: 1px solid var(--rust);
      padding: 3px 14px 3px 18px;
      margin-top: 8px;
      opacity: 0.85;
    }

    /* tagline */
    .tagline {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(14px, 1.8vw, 20px);
      color: var(--blue);
      letter-spacing: 0.06em;
      margin-top: 28px;
      opacity: 0;
      animation: fadeUp 1.2s ease 1.6s forwards;
    }

    /* ── CTA BUTTON ── */
    .cta-wrap {
      margin-top: 52px;
      opacity: 0;
      animation: fadeUp 1.2s ease 2s forwards;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      font-family: "DM Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      background: var(--navy);
      padding: 16px 36px;
      border: 1px solid var(--navy);
      position: relative;
      overflow: hidden;
      transition: color 0.5s ease;
      cursor: pointer;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--rust);
      transform: translateX(-101%);
      transition: transform 0.5s cubic-bezier(0.76, 0, 0.24, 1);
    }

    .cta:hover::before { transform: translateX(0); }
    .cta:hover { color: var(--cream); }

    .cta span { position: relative; z-index: 1; }

    .cta-arrow {
      position: relative;
      z-index: 1;
      display: inline-block;
      transition: transform 0.4s ease;
    }
    .cta:hover .cta-arrow { transform: translateX(5px); }

    /* ── BOTTOM ── */
    .label-bl {
      grid-row: 3; grid-column: 1;
      align-self: end;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 12px;
      color: var(--blue);
      opacity: 0;
      animation: fadeUp 1s ease 2.4s forwards;
    }

    .label-br {
      grid-row: 3; grid-column: 2;
      align-self: end;
      justify-self: end;
      font-family: "DM Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--navy);
      opacity: 0.4;
      opacity: 0;
      animation: fadeUp 1s ease 2.6s forwards;
    }

    /* ── HORIZONTAL RULES ── */
    .rule-top, .rule-bottom {
      position: fixed;
      left: 56px; right: 56px;
      height: 1px;
      background: var(--blue);
      opacity: 0.15;
    }
    .rule-top    { top: 80px;    animation: expandH 1.4s ease 0.2s both; }
    .rule-bottom { bottom: 80px; animation: expandH 1.4s ease 0.4s both; }

    /* ── FLOATING DOT ── */
    .dot {
      position: fixed;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--rust);
      opacity: 0.6;
      animation: float 6s ease-in-out infinite;
    }
    .dot:nth-child(1) { top: 22%; left: 8%;  animation-delay: 0s;   animation-duration: 7s; }
    .dot:nth-child(2) { top: 60%; right: 9%; animation-delay: 1.5s; animation-duration: 5s; }
    .dot:nth-child(3) { top: 80%; left: 15%; animation-delay: 3s;   animation-duration: 8s; }

    /* ── KEYFRAMES ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @keyframes expandH {
      from { transform: scaleX(0); transform-origin: left; }
      to   { transform: scaleX(1); transform-origin: left; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px);   }
      50%       { transform: translateY(-12px); }
    }

    /* ── PAGE TRANSITION OUT ── */
    body.leaving {
      animation: leaveOut 0.7s ease forwards;
    }

    @keyframes leaveOut {
      to { opacity: 0; transform: translateY(-20px); }
    }
  </style>
</head>
<body>

  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>

  <div class="rule-top"></div>
  <div class="rule-bottom"></div>

  <div class="page">

    <div class="label-tl">( language model )</div>
    <div class="label-tr">2025</div>

    <div class="center">

      <div class="pre-title">introducing</div>

      <div class="paren-wrap">
        <span class="paren">(</span>
        <div class="darwin">
          <div class="darwin-name">DARWIN</div>
          <div class="darwin-num">[ MODEL — 1 ]</div>
        </div>
        <span class="paren">)</span>
      </div>

      <div class="tagline">a mind, built from first principles</div>

      <div class="cta-wrap">
        <a class="cta" onclick="navigate()">
          <span>Begin conversation</span>
          <span class="cta-arrow">→</span>
        </a>
      </div>

    </div>

    <div class="label-bl">( trained on Raspberry Pi 5 )</div>
    <div class="label-br">darwin-1.local</div>

  </div>

  <script>
    function navigate() {
      document.body.classList.add("leaving");
      setTimeout(() => { window.location.href = "chat.html"; }, 650);
    }
  </script>

</body>
</html>
