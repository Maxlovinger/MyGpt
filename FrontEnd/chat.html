<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darwin-1 — Conversation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Pinyon+Script&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: "BTCGods";
      src: url("fonts/BTCGods.woff") format("woff"),
           url("fonts/BTCGods.otf") format("opentype");
      font-display: swap;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #EFE4D2;
      --blue:  #254D70;
      --navy:  #131D4F;
      --rust:  #954C2E;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--navy);
      cursor: none;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--rust);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    /* ── GRAIN OVERLAY ── */
    body::after {
      content: "";
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 200;
      opacity: 0.55;
    }

    /* ── CANVAS ── */
    #petal-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ── BORDER LINES ── */
    .line-top {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--blue), transparent);
      transform: scaleX(0);
      transform-origin: left;
      z-index: 50;
    }
    .line-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--blue), transparent);
      transform: scaleX(0);
      transform-origin: right;
      z-index: 50;
    }
    .line-left {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--blue), transparent);
      transform: scaleY(0);
      transform-origin: top;
      z-index: 50;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      border-bottom: 1px solid rgba(37, 77, 112, 0.12);
      flex-shrink: 0;
      opacity: 0;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .logo {
      font-family: "BTCGods", sans-serif;
      font-size: 24px;
      letter-spacing: 0.05em;
      color: var(--navy);
    }

    .logo-tag {
      font-family: "DM Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.28em;
      color: var(--rust);
      border: 1px solid var(--rust);
      padding: 3px 10px 3px 12px;
      opacity: 0.75;
    }

    .header-center {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 13px;
      color: var(--blue);
      opacity: 0.4;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: "DM Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--blue);
      opacity: 0.5;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #7bbf82;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .back-btn {
      font-family: "DM Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--blue);
      text-decoration: none;
      text-transform: uppercase;
      opacity: 0.5;
      transition: opacity 0.3s;
      cursor: none;
      background: none;
      border: none;
      padding: 0;
    }
    .back-btn:hover { opacity: 1; }

    /* ── CHAT AREA ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 48px 48px 32px;
      display: flex;
      flex-direction: column;
      gap: 40px;
      position: relative;
      z-index: 10;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(37, 77, 112, 0.15); border-radius: 2px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
    }

    .empty-script {
      font-family: "Pinyon Script", cursive;
      font-size: 54px;
      color: var(--rust);
      opacity: 0.6;
      line-height: 1;
    }

    .empty-divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--blue), transparent);
      opacity: 0.3;
      margin: 4px auto;
    }

    .empty-sub {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 16px;
      color: var(--blue);
      opacity: 0.55;
      letter-spacing: 0.06em;
    }

    .empty-hint {
      font-family: "DM Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: var(--navy);
      opacity: 0.25;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* ── MESSAGES ── */
    .message {
      display: flex;
      gap: 20px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      opacity: 0;
      animation: msgEnter 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }


    .message.user  { flex-direction: row-reverse; }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 2px;
    }

    .avatar-label {
      font-family: "DM Mono", monospace;
      font-size: 8px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .message.user .avatar-label { color: var(--rust); opacity: 0.7; }
    .message.bot  .avatar-label {
      font-family: "BTCGods", sans-serif;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--navy);
      opacity: 0.5;
    }

    /* Message content */
    .msg-content { flex: 1; min-width: 0; }

    .msg-meta {
      font-family: "DM Mono", monospace;
      font-size: 8.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.35;
    }

    .message.user .msg-meta { text-align: right; color: var(--rust); }
    .message.bot  .msg-meta { color: var(--blue); }

    /* Bubble */
    .bubble {
      font-family: "Cormorant Garamond", serif;
      font-size: 18px;
      line-height: 1.8;
      padding: 18px 26px;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }

    .message.user .bubble {
      background: var(--navy);
      color: var(--cream);
      border-radius: 2px 2px 0 2px;
      margin-left: 40px;
    }

    .message.bot .bubble {
      background: rgba(37, 77, 112, 0.055);
      color: var(--navy);
      border: 1px solid rgba(37, 77, 112, 0.1);
      border-radius: 2px 2px 2px 0;
      margin-right: 40px;
    }

    /* Bot bubble — left accent stroke */
    .message.bot .bubble::before {
      content: "";
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 1.5px;
      background: linear-gradient(to bottom, transparent, var(--rust), transparent);
      opacity: 0.4;
    }

    /* ── TYPING INDICATOR ── */
    .typing-wrap {
      display: flex;
      gap: 20px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      opacity: 0;
      animation: msgEnter 0.4s ease forwards;
    }

    .typing-dots {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 20px 26px;
      background: rgba(37, 77, 112, 0.055);
      border: 1px solid rgba(37, 77, 112, 0.1);
      border-radius: 2px 2px 2px 0;
      width: fit-content;
      position: relative;
    }

    .typing-dots::before {
      content: "";
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 1.5px;
      background: linear-gradient(to bottom, transparent, var(--rust), transparent);
      opacity: 0.35;
    }

    .typing-dots span {
      width: 5px; height: 5px;
      background: var(--blue);
      border-radius: 50%;
      opacity: 0.35;
      animation: dotBlink 1.4s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── INPUT AREA ── */
    #input-area {
      position: relative;
      z-index: 10;
      padding: 20px 48px 32px;
      border-top: 1px solid rgba(37, 77, 112, 0.1);
      flex-shrink: 0;
      opacity: 0;
    }

    .input-row {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 14px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      position: relative;
      border-bottom: 1.5px solid rgba(37, 77, 112, 0.25);
      transition: border-color 0.35s ease;
    }
    .input-wrap:focus-within {
      border-color: var(--navy);
    }

    .input-label {
      position: absolute;
      top: -18px;
      left: 0;
      font-family: "DM Mono", monospace;
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--blue);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .input-wrap:focus-within .input-label {
      opacity: 0.4;
      transform: translateY(0);
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: "Cormorant Garamond", serif;
      font-size: 18px;
      line-height: 1.6;
      color: var(--navy);
      padding: 10px 0;
      max-height: 150px;
      overflow-y: auto;
      cursor: none;
    }

    textarea::placeholder {
      font-style: italic;
      color: var(--blue);
      opacity: 0.35;
    }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--navy);
      color: var(--cream);
      border: none;
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      transition: color 0.4s ease;
    }
    .send-btn::before {
      content: "";
      position: absolute; inset: 0;
      background: var(--rust);
      transform: translateX(-101%);
      transition: transform 0.45s cubic-bezier(0.76, 0, 0.24, 1);
    }
    .send-btn:hover::before { transform: translateX(0); }
    .send-btn svg { position: relative; z-index: 1; }
    .send-btn:disabled {
      background: rgba(37, 77, 112, 0.15);
      cursor: not-allowed;
    }
    .send-btn:disabled::before { display: none; }

    /* Conversation counter */
    .convo-counter {
      max-width: 800px;
      margin: 12px auto 0;
      display: block;
      font-family: "DM Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--navy);
      opacity: 0.2;
      text-transform: uppercase;
    }

    /* ── KEYFRAMES ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.82); }
    }
    @keyframes dotBlink {
      0%, 80%, 100% { opacity: 0.35; transform: scale(1); }
      40%            { opacity: 1;    transform: scale(1.3); }
    }

    /* ── PAGE TRANSITIONS ── */
    body.leaving {
      animation: pageLeave 0.55s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }
    @keyframes pageLeave {
      to { opacity: 0; transform: translateY(-20px); }
    }

    /* Message animation — GSAP sets these */
    .message, .typing-wrap { opacity: 0; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header { padding: 18px 24px; }
      .header-center { display: none; }
      #chat { padding: 32px 24px 24px; gap: 28px; }
      #input-area { padding: 16px 24px 24px; }
      .message.user .bubble { margin-left: 0; }
      .message.bot  .bubble { margin-right: 0; }
      .cursor, .cursor-ring { display: none; }
      body { cursor: auto; }
      textarea { cursor: text; }
      .send-btn { cursor: pointer; }
      .back-btn { cursor: pointer; }
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>

  <!-- Border lines -->
  <div class="line-top"></div>
  <div class="line-bottom"></div>
  <div class="line-left"></div>

  <!-- Petal canvas -->
  <canvas id="petal-canvas"></canvas>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <span class="logo">DARWIN</span>
      <span class="logo-tag">[ 1 ]</span>
    </div>

    <div class="header-center">( conversation )</div>

    <div class="header-right">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <span>online</span>
      </div>
      <button class="back-btn" onclick="goHome()">&#8592; home</button>
    </div>
  </header>

  <!-- CHAT -->
  <div id="chat">
    <div class="empty-state" id="empty-state">
      <div class="empty-script">speak freely</div>
      <div class="empty-divider"></div>
      <div class="empty-sub">( Darwin is listening )</div>
      <div class="empty-hint">press enter &nbsp;&mdash;&nbsp; shift+enter for newline</div>
    </div>
  </div>

  <!-- INPUT -->
  <div id="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <div class="input-label">prompt</div>
        <textarea id="prompt" rows="1" placeholder="say something..."></textarea>
      </div>
      <button class="send-btn" id="send" aria-label="Send message">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13V3M3 8l5-5 5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="convo-counter" id="counter">0 exchanges</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
  <script>
    CustomEase.create("expo",   "0.76, 0, 0.24, 1");
    CustomEase.create("spring", "0.22, 1, 0.36, 1");

    // ── INK CURTAIN ENTRANCE ──
    if (sessionStorage.getItem('ink-enter')) {
      sessionStorage.removeItem('ink-enter');
      document.body.classList.remove('entering');

      const ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;background:#131D4F;z-index:500;transform-origin:top center;';
      document.body.appendChild(ov);

      // GSAP curtain wipe upward
      requestAnimationFrame(() => {
        gsap.to(ov, {
          scaleY: 0,
          duration: 1.15,
          ease: "expo",
          transformOrigin: "top center",
          onComplete: () => ov.remove()
        });
      });

      // Stagger header + input entrance after curtain starts
      gsap.fromTo('header',      { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.8, ease: "spring", delay: 0.3 });
      gsap.fromTo('#input-area', { opacity: 0, y: 20  }, { opacity: 1, y: 0, duration: 0.8, ease: "spring", delay: 0.45 });
      gsap.fromTo('.empty-state',{ opacity: 0, y: 16  }, { opacity: 1, y: 0, duration: 0.9, ease: "spring", delay: 0.6 });
    } else {
      // Normal entrance
      gsap.fromTo('header',      { opacity: 0, y: -14 }, { opacity: 1, y: 0, duration: 0.8, ease: "spring", delay: 0.2 });
      gsap.fromTo('#input-area', { opacity: 0, y: 18  }, { opacity: 1, y: 0, duration: 0.8, ease: "spring", delay: 0.35 });
      gsap.fromTo('.empty-state',{ opacity: 0, y: 14  }, { opacity: 1, y: 0, duration: 0.9, ease: "spring", delay: 0.5 });
    }

    // Border lines
    gsap.to('.line-top',    { scaleX: 1, duration: 1.4, ease: "expo", transformOrigin: "left center",   delay: 0.1 });
    gsap.to('.line-bottom', { scaleX: 1, duration: 1.4, ease: "expo", transformOrigin: "right center",  delay: 0.25 });
    gsap.to('.line-left',   { scaleY: 1, duration: 1.4, ease: "expo", transformOrigin: "center top",    delay: 0.4 });

    // ── CURSOR ──
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      gsap.set(cur, { x: e.clientX, y: e.clientY });
    });

    // ── CHERRY BLOSSOM PETALS (sparse — doesn't compete with chat) ──
    const canvas = document.getElementById('petal-canvas');
    const ctx    = canvas.getContext('2d');
    const COLORS = ['#ECC8C5','#E8B4B0','#D4A0A0','#C9A0A0','#EFD5D0','#EBBCBC'];

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function drawLeafPetal(x, y, size, angle, opacity, color) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.globalAlpha = opacity;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.bezierCurveTo( size*0.6, -size*0.5,  size*0.8, size*0.3, 0,  size);
      ctx.bezierCurveTo(-size*0.8,  size*0.3, -size*0.6, -size*0.5, 0, -size);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }

    const petals = Array.from({ length: 10 }, (_, i) => ({
      x:         Math.random() * window.innerWidth,
      y:         Math.random() * window.innerHeight - window.innerHeight,
      size:      3 + Math.random() * 5,
      speed:     0.25 + Math.random() * 0.5,
      drift:     (Math.random() - 0.5) * 0.4,
      angle:     Math.random() * Math.PI * 2,
      spin:      (Math.random() - 0.5) * 0.013,
      sway:      Math.random() * 100,
      swaySpeed: 0.006 + Math.random() * 0.009,
      opacity:   0.1 + Math.random() * 0.18,
      color:     COLORS[i % COLORS.length],
      delay:     Math.random() * 200,
    }));

    let frame = 0;
    (function animPetals() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      frame++;
      petals.forEach(p => {
        if (frame < p.delay) return;
        p.y += p.speed;
        p.x += p.drift + Math.sin(frame * p.swaySpeed + p.sway) * 0.4;
        p.angle += p.spin;
        if (p.y > canvas.height + 20) { p.y = -20; p.x = Math.random() * canvas.width; }
        drawLeafPetal(p.x, p.y, p.size, p.angle, p.opacity, p.color);
      });
      requestAnimationFrame(animPetals);
    })();

    // ── CONTROLS ──
    const chat     = document.getElementById('chat');
    const emptyEl  = document.getElementById('empty-state');
    const promptEl = document.getElementById('prompt');
    const sendBtn  = document.getElementById('send');
    const counter  = document.getElementById('counter');
    let exchanges  = 0;

    promptEl.addEventListener('input', () => {
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 150) + 'px';
    });

    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    sendBtn.addEventListener('click', send);

    // ── TYPEWRITER ──
    function typewrite(el, text) {
      el.textContent = '';
      let i = 0;
      function next() {
        if (i >= text.length) return;
        el.textContent += text[i];
        chat.scrollTop = chat.scrollHeight;
        const ch = text[i++];
        let delay = 16;
        if ('.!?'.includes(ch))  delay = 260;
        else if (',;:'.includes(ch)) delay = 90;
        else if (ch === ' ')     delay = 7;
        setTimeout(next, delay);
      }
      next();
    }

    // ── MESSAGES ──
    function buildMessageShell(role) {
      if (emptyEl) {
        gsap.to(emptyEl, { opacity: 0, y: -10, duration: 0.4, ease: 'power2.in', onComplete: () => emptyEl.style.display = 'none' });
      }

      const wrap = document.createElement('div');
      wrap.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      const avLabel = document.createElement('div');
      avLabel.className = 'avatar-label';
      avLabel.textContent = role === 'user' ? 'you' : 'D1';
      avatar.appendChild(avLabel);

      const content = document.createElement('div');
      content.className = 'msg-content';

      const meta = document.createElement('div');
      meta.className = 'msg-meta';
      meta.textContent = role === 'user' ? 'you' : 'darwin — 1';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      content.appendChild(meta);
      content.appendChild(bubble);
      wrap.appendChild(avatar);
      wrap.appendChild(content);
      chat.appendChild(wrap);

      // GSAP entrance: user slides from right, bot from left + blur
      const xDir = role === 'user' ? 24 : -24;
      gsap.fromTo(wrap,
        { opacity: 0, x: xDir, filter: 'blur(6px)' },
        { opacity: 1, x: 0, filter: 'blur(0px)', duration: 0.65, ease: 'spring' }
      );

      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function addMessage(text, role) {
      const bubble = buildMessageShell(role);
      if (role === 'bot') {
        typewrite(bubble, text);
      } else {
        bubble.textContent = text;
      }
      return bubble;
    }

    function addTyping() {
      if (emptyEl) emptyEl.style.display = 'none';
      const wrap = document.createElement('div');
      wrap.className = 'typing-wrap';
      wrap.id = 'typing-wrap';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      const avLabel = document.createElement('div');
      avLabel.className = 'avatar-label';
      avLabel.textContent = 'D1';
      avatar.appendChild(avLabel);

      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';

      wrap.appendChild(avatar);
      wrap.appendChild(dots);
      chat.appendChild(wrap);

      gsap.fromTo(wrap,
        { opacity: 0, x: -24, filter: 'blur(6px)' },
        { opacity: 1, x: 0, filter: 'blur(0px)', duration: 0.55, ease: 'spring' }
      );

      chat.scrollTop = chat.scrollHeight;
      return wrap;
    }

    // ── SEND ──
    async function send() {
      const prompt = promptEl.value.trim();
      if (!prompt || sendBtn.disabled) return;

      promptEl.value = '';
      promptEl.style.height = 'auto';
      sendBtn.disabled = true;

      addMessage(prompt, 'user');
      const typingWrap = addTyping();

      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, temperature: 0.8, max_tokens: 150 }),
        });

        const data = await res.json();
        typingWrap.remove();
        addMessage(data.response || data.error || '( no response )', 'bot');
        exchanges++;
        counter.textContent = exchanges + (exchanges === 1 ? ' exchange' : ' exchanges');
      } catch {
        typingWrap.remove();
        addMessage('( could not reach Darwin )', 'bot');
      }

      sendBtn.disabled = false;
      promptEl.focus();
    }

    // ── NAVIGATION ──
    function goHome() {
      document.body.classList.remove('entering');
      document.body.classList.add('leaving');
      setTimeout(() => { window.location.href = 'index.html'; }, 520);
    }

    // ── REDUCED MOTION ──
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('*').forEach(el => {
        el.style.animationDuration = '0.01ms';
        el.style.animationDelay   = '0ms';
      });
    }
  </script>
</body>
</html>
